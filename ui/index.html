<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>safe-mcp-proxy</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: ui-monospace, "Cascadia Code", "Fira Code", monospace;
      font-size: 13px;
      background: #0f1117;
      color: #c9d1d9;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      padding: 10px 16px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 13px;
      font-weight: 600;
      color: #e6edf3;
      letter-spacing: 0.03em;
    }

    header .subtitle {
      color: #6e7681;
      font-size: 11px;
    }

    #status {
      margin-left: auto;
      font-size: 11px;
      color: #6e7681;
    }

    #status.live::before {
      content: "● ";
      color: #3fb950;
    }

    #status.error::before {
      content: "● ";
      color: #f85149;
    }

    main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Left panel ─────────────────────────────────────── */
    #list-panel {
      width: 38%;
      min-width: 300px;
      border-right: 1px solid #30363d;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #list-panel h2 {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #6e7681;
      padding: 8px 12px;
      border-bottom: 1px solid #21262d;
      flex-shrink: 0;
    }

    #trace-table-wrap {
      overflow-y: auto;
      flex: 1;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      position: sticky;
      top: 0;
      background: #161b22;
      color: #6e7681;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 5px 10px;
      text-align: left;
      border-bottom: 1px solid #21262d;
      z-index: 1;
    }

    tbody tr {
      cursor: pointer;
      border-bottom: 1px solid #161b22;
      transition: background 0.08s;
    }

    tbody tr:hover { background: #1c2128; }
    tbody tr.selected { background: #1f2d3d; }

    tbody td {
      padding: 5px 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 0;
    }

    td.col-time  { width: 70px; color: #6e7681; }
    td.col-tool  { width: 40%; color: #e6edf3; }
    td.col-dec   { width: 80px; }
    td.col-src   { width: 30%; color: #8b949e; }

    /* ── Scenario bar ───────────────────────────────────── */
    #scenario-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-bottom: 1px solid #21262d;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .scenario-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #6e7681;
      margin-right: 2px;
    }

    .scenario-btn {
      background: #21262d;
      color: #c9d1d9;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 3px 10px;
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
      transition: background 0.1s, color 0.1s;
    }

    .scenario-btn:hover:not(:disabled) { background: #2d333b; color: #e6edf3; }
    .scenario-btn:disabled { opacity: 0.5; cursor: default; }

    /* ── Decision badges ────────────────────────────────── */
    .badge {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.04em;
      line-height: 16px;
    }
    .badge-ALLOW    { background: #1a3a5c; color: #58a6ff; }
    .badge-DENY     { background: #3d2200; color: #e3b341; }
    .badge-ABSENT   { background: #21262d; color: #8b949e; }
    .badge-SIMULATE { background: #0d2d2d; color: #39d0d0; }

    /* ── Right panel ────────────────────────────────────── */
    #detail-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Panel tabs ─────────────────────────────────────── */
    #panel-tabs {
      display: flex;
      gap: 4px;
      padding: 6px 10px;
      border-bottom: 1px solid #21262d;
      flex-shrink: 0;
    }

    .panel-tab {
      background: #21262d;
      color: #6e7681;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 3px 10px;
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
      transition: background 0.1s, color 0.1s;
    }

    .panel-tab:hover { background: #2d333b; color: #c9d1d9; }
    .panel-tab.active { background: #1a3a5c; color: #58a6ff; border-color: #1a3a5c; }

    #detail-view {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
    }

    /* ── Compare panel ──────────────────────────────────── */
    #compare-panel {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
    }

    #compare-panel select {
      background: #21262d;
      color: #c9d1d9;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 4px 8px;
      font-family: inherit;
      font-size: 12px;
      width: 100%;
      margin-top: 4px;
    }

    .cmp-worlds {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 4px;
    }

    .cmp-world-label {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #c9d1d9;
      font-size: 12px;
      cursor: pointer;
    }

    .cmp-world-label input[type=checkbox] {
      accent-color: #58a6ff;
      width: 14px;
      height: 14px;
    }

    #cmp-run-btn {
      margin-top: 14px;
      background: #1a3a5c;
      color: #58a6ff;
      border: 1px solid #1f4d7a;
      border-radius: 4px;
      padding: 5px 16px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.1s;
    }

    #cmp-run-btn:hover:not(:disabled) { background: #1f4d7a; }
    #cmp-run-btn:disabled { opacity: 0.5; cursor: default; }

    #cmp-result { margin-top: 16px; }

    .cmp-banner {
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      margin-bottom: 10px;
    }

    .cmp-diverged  { background: #3d2200; color: #e3b341; }
    .cmp-converged { background: #1a3d1a; color: #3fb950; }
    .cmp-row-diff td { background: #3d2200; }

    .cmp-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .cmp-table thead th {
      background: #161b22;
      color: #6e7681;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 5px 10px;
      text-align: left;
      border-bottom: 1px solid #21262d;
    }

    .cmp-table tbody td {
      padding: 5px 10px;
      border-bottom: 1px solid #161b22;
      color: #c9d1d9;
    }

    #detail-panel .placeholder {
      color: #6e7681;
      margin-top: 40px;
      text-align: center;
    }

    .detail-section {
      margin-bottom: 20px;
    }

    .detail-section h3 {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #6e7681;
      margin-bottom: 8px;
      padding-bottom: 4px;
      border-bottom: 1px solid #21262d;
    }

    .field-grid {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 4px 12px;
    }

    .field-key {
      color: #6e7681;
      padding: 2px 0;
    }

    .field-val {
      color: #e6edf3;
      word-break: break-all;
      padding: 2px 0;
    }

    .field-val.mono {
      font-size: 11px;
      color: #8b949e;
    }

    /* ── Pipeline diagram ───────────────────────────────── */
    .pipeline {
      display: flex;
      align-items: center;
      gap: 0;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    .pipe-step {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .pipe-label {
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 11px;
      background: #21262d;
      color: #6e7681;
      white-space: nowrap;
    }

    .pipe-label.active {
      background: #1a3a5c;
      color: #58a6ff;
      font-weight: 700;
    }

    .pipe-label.active.deny     { background: #3d2200; color: #e3b341; }
    .pipe-label.active.absent   { background: #21262d; color: #c9d1d9; }
    .pipe-label.active.simulate { background: #0d2d2d; color: #39d0d0; }

    .pipe-arrow {
      color: #30363d;
      margin: 0 4px;
      font-size: 14px;
      align-self: flex-start;
      padding-top: 6px;
    }

    .pipe-sublabel {
      font-size: 9px;
      color: #6e7681;
      margin-top: 2px;
      white-space: nowrap;
      max-width: 100px;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: center;
    }
    .pipe-sublabel.allow    { color: #58a6ff; }
    .pipe-sublabel.deny     { color: #e3b341; }
    .pipe-sublabel.absent   { color: #8b949e; }
    .pipe-sublabel.simulate { color: #39d0d0; }

    /* ── Rule explanation (DS4.2) ───────────────────────────── */
    .rule-explain {
      margin-top: 6px;
      padding: 8px 10px;
      background: #0d1117;
      border: 1px solid #21262d;
      border-radius: 4px;
      font-size: 11px;
      line-height: 1.6;
    }
    .rule-explain-summary {
      color: #c9d1d9;
      margin-bottom: 5px;
    }
    .rule-explain-conditions {
      list-style: none;
      padding: 0;
      margin: 0 0 5px 0;
    }
    .rule-explain-conditions li { color: #8b949e; }
    .rule-explain-conditions li::before { content: "✓ "; color: #3fb950; }
    .rule-explain-conditions li.fired::before { content: "✗ "; color: #f85149; }
    .rule-explain-link { font-size: 10px; }
    .rule-explain-link a { color: #58a6ff; text-decoration: none; }
    .rule-explain-link a:hover { text-decoration: underline; }

    #empty-msg { color: #6e7681; padding: 20px 10px; text-align: center; font-size: 12px; }
  </style>
</head>
<body>

<header>
  <h1>safe-mcp-proxy</h1>
  <span class="subtitle">trace viewer</span>
  <span id="status">connecting…</span>
</header>

<main>
  <section id="list-panel" aria-label="Trace list">
    <h2>Traces</h2>
    <div id="scenario-bar">
      <span class="scenario-label">Run:</span>
      <button class="scenario-btn" data-scenario="benign_flow">Benign</button>
      <button class="scenario-btn" data-scenario="prompt_injection">Injection</button>
      <button class="scenario-btn" data-scenario="poisoned_descriptor">Poisoned</button>
      <button class="scenario-btn" data-scenario="absent_tool">Absent</button>
    </div>
    <div id="trace-table-wrap">
      <table id="trace-table" aria-label="Audit traces">
        <thead>
          <tr>
            <th class="col-time">Time</th>
            <th class="col-tool">Tool</th>
            <th class="col-dec">Decision</th>
            <th class="col-src">Channel</th>
          </tr>
        </thead>
        <tbody id="trace-body">
          <tr><td colspan="4" id="empty-msg">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </section>

  <section id="detail-panel" aria-label="Trace detail">
    <div id="panel-tabs">
      <button class="panel-tab active" data-panel="detail">Detail</button>
      <button class="panel-tab" data-panel="compare">World Diff</button>
    </div>
    <div id="detail-view">
      <p class="placeholder" id="detail-placeholder">Select a trace to see details.</p>
      <div id="detail-content" style="display:none"></div>
    </div>
    <div id="compare-panel" style="display:none">
      <div class="detail-section">
        <h3>Scenario</h3>
        <select id="cmp-scenario">
          <option value="benign_flow">benign_flow</option>
          <option value="prompt_injection">prompt_injection</option>
          <option value="poisoned_descriptor">poisoned_descriptor</option>
          <option value="absent_tool">absent_tool</option>
        </select>
      </div>
      <div class="detail-section">
        <h3>Worlds</h3>
        <div class="cmp-worlds">
          <label class="cmp-world-label">
            <input type="checkbox" class="cmp-world" value="world_a" checked> world_a — full access
          </label>
          <label class="cmp-world-label">
            <input type="checkbox" class="cmp-world" value="world_b" checked> world_b — read-only
          </label>
          <label class="cmp-world-label">
            <input type="checkbox" class="cmp-world" value="world_c" checked> world_c — no email
          </label>
        </div>
      </div>
      <button id="cmp-run-btn">Compare</button>
      <div id="cmp-result"></div>
    </div>
  </section>
</main>

<script>
  const POLL_MS = 5000;

  const statusEl  = document.getElementById('status');
  const tbody     = document.getElementById('trace-body');
  const detailPH  = document.getElementById('detail-placeholder');
  const detailDiv = document.getElementById('detail-content');

  let traces = [];
  let selectedId = null;

  // ── Decision semantics ───────────────────────────────────
  const DECISION_SEMANTICS = {
    ALLOW:    'Action executed',
    DENY:     'Action exists but blocked by policy',
    ABSENT:   'Action does not exist in this world',
    SIMULATE: 'Action simulated (no side effects)',
  };

  // ── Decision → pipeline stage ────────────────────────────
  const PIPELINE_STAGES = [
    { label: 'Input',      rules: [] },
    { label: 'Provenance', rules: [] },
    { label: 'Registry',   rules: ['tool_not_allowlisted', 'capability_not_allowed'] },
    { label: 'Policy',     rules: ['descriptor_drift', 'tainted_external_side_effect'] },
    { label: 'Decision',   rules: ['default_allow'] },
  ];

  function activeStageIndex(rule) {
    for (let i = 0; i < PIPELINE_STAGES.length; i++) {
      if (PIPELINE_STAGES[i].rules.includes(rule)) return i;
    }
    return PIPELINE_STAGES.length - 1;
  }

  // ── Rule explanations (DS4.2) ────────────────────────────
  const RULE_EXPLANATIONS = {
    tool_not_allowlisted: {
      summary: 'Tool is absent from this world — it does not exist here.',
      conditions: (t) => [
        { text: `"${t.tool_requested}" is not in allowed_tools`, fired: true },
      ],
    },
    capability_not_allowed: {
      summary: "Tool's capability is disabled in the world manifest.",
      conditions: (t) => [
        { text: `capability for "${t.tool_requested}" is set to false`, fired: true },
      ],
    },
    descriptor_drift: {
      summary: 'Tool schema changed since registration — possible runtime tampering.',
      conditions: (t) => [
        { text: 'SHA-256 of current schema does not match the pinned hash', fired: true },
        ...(t.descriptor_hash ? [{ text: `recorded hash: ${t.descriptor_hash.slice(0, 16)}…`, fired: false }] : []),
      ],
    },
    tainted_external_side_effect: {
      summary: 'Request from an untrusted channel cannot trigger external side effects.',
      conditions: (t) => [
        { text: `source_channel "${t.source_channel}" is a tainted channel (email / web / tool_output)`, fired: true },
        { text: `"${t.tool_requested}" has side_effect_type = external`, fired: true },
      ],
    },
    default_allow: {
      summary: 'All checks passed — tool is allowlisted, enabled, untampered, and source is trusted.',
      conditions: (t) => [
        { text: `"${t.tool_requested}" is in allowed_tools`, fired: false },
        { text: 'capability is enabled', fired: false },
        { text: 'descriptor hash matches registered value', fired: false },
        { text: `source_channel "${t.source_channel}" is trusted`, fired: false },
      ],
    },
  };

  // ── Pipeline sub-label for each stage (DS4.1) ────────────
  function stageSublabel(trace, stageIdx) {
    const rule = trace.rule_hit;
    switch (stageIdx) {
      case 0: return trace.tool_requested;
      case 1: return trace.taint ? '⚠ tainted' : 'clean';
      case 2:
        if (rule === 'tool_not_allowlisted')   return 'not in allowlist';
        if (rule === 'capability_not_allowed') return 'disabled';
        return 'present';
      case 3:
        if (rule === 'descriptor_drift')                 return 'hash mismatch';
        if (rule === 'tainted_external_side_effect')     return 'taint blocked';
        return '—';
      case 4: return trace.decision;
      default: return '';
    }
  }

  // ── Explanation box ──────────────────────────────────────
  function renderExplanation(trace) {
    const explain = RULE_EXPLANATIONS[trace.rule_hit];
    if (!explain) return '';
    const condHtml = explain.conditions(trace)
      .map(c => `<li class="${c.fired ? 'fired' : ''}">${c.text}</li>`)
      .join('');
    return `<div class="rule-explain" style="grid-column:1/-1">
      <div class="rule-explain-summary">${explain.summary}</div>
      <ul class="rule-explain-conditions">${condHtml}</ul>
      <div class="rule-explain-link">See: <a href="https://github.com/sv-pro/safe-mcp-proxy/blob/main/safe_mcp_proxy/policy_engine.py" target="_blank">policy_engine.py ↗</a></div>
    </div>`;
  }

  // ── Formatting ────────────────────────────────────────────
  function fmtTime(ts) {
    try {
      return new Date(ts).toLocaleTimeString('en-GB', { hour12: false });
    } catch { return ts; }
  }

  function badge(decision) {
    const cls = 'badge badge-' + (decision || 'ABSENT');
    const tip = DECISION_SEMANTICS[decision] || decision || '?';
    return `<span class="${cls}" title="${tip}">${decision || '?'}</span>`;
  }

  // ── Render list ───────────────────────────────────────────
  function renderList() {
    if (!traces.length) {
      tbody.innerHTML = '<tr><td colspan="4" id="empty-msg">No traces yet.</td></tr>';
      return;
    }
    // Show newest first
    const rows = [...traces].reverse().map(t => {
      const sel = t.id === selectedId ? ' class="selected"' : '';
      return `<tr data-id="${t.id}"${sel}>
        <td class="col-time">${fmtTime(t.timestamp)}</td>
        <td class="col-tool" title="${t.tool_requested}">${t.tool_requested}</td>
        <td class="col-dec">${badge(t.decision)}</td>
        <td class="col-src">${t.source_channel}</td>
      </tr>`;
    });
    tbody.innerHTML = rows.join('');
    tbody.querySelectorAll('tr[data-id]').forEach(row => {
      row.addEventListener('click', () => selectTrace(Number(row.dataset.id)));
    });
  }

  // ── Render detail ─────────────────────────────────────────
  function renderDetail(trace) {
    const stageIdx = activeStageIndex(trace.rule_hit);
    const dec = trace.decision;
    const isDeny   = dec === 'DENY';
    const isAbsent = dec === 'ABSENT';

    const isSimulate = dec === 'SIMULATE';
    const pipelineHtml = PIPELINE_STAGES.map((s, i) => {
      let labelCls = 'pipe-label';
      let sublabelCls = 'pipe-sublabel';
      if (i === stageIdx) {
        labelCls += ' active';
        if (isDeny)          { labelCls += ' deny';     sublabelCls += ' deny'; }
        else if (isAbsent)   { labelCls += ' absent';   sublabelCls += ' absent'; }
        else if (isSimulate) { labelCls += ' simulate'; sublabelCls += ' simulate'; }
        else                 { sublabelCls += ' allow'; }
      }
      const sub = stageSublabel(trace, i);
      const arrow = i < PIPELINE_STAGES.length - 1
        ? '<span class="pipe-arrow">›</span>' : '';
      return `<span class="pipe-step"><span class="${labelCls}">${s.label}</span>${sub ? `<span class="${sublabelCls}">${sub}</span>` : ''}</span>${arrow}`;
    }).join('');

    const hashDisplay = trace.descriptor_hash
      ? `<span class="mono">${trace.descriptor_hash.slice(0, 16)}…</span>`
      : '<span style="color:#6e7681">—</span>';

    detailDiv.innerHTML = `
      <div class="detail-section">
        <h3>Decision</h3>
        <div class="field-grid">
          <span class="field-key">outcome</span>
          <span class="field-val">${badge(trace.decision)}</span>
          <span class="field-key">meaning</span>
          <span class="field-val">${DECISION_SEMANTICS[trace.decision] || ''}</span>
          <span class="field-key">rule</span>
          <span class="field-val">${trace.rule_hit}</span>
          ${renderExplanation(trace)}
        </div>
      </div>

      <div class="detail-section">
        <h3>Pipeline</h3>
        <div class="pipeline">${pipelineHtml}</div>
      </div>

      <div class="detail-section">
        <h3>Request</h3>
        <div class="field-grid">
          <span class="field-key">tool</span>
          <span class="field-val">${trace.tool_requested}</span>
          <span class="field-key">source_channel</span>
          <span class="field-val">${trace.source_channel}</span>
          <span class="field-key">taint</span>
          <span class="field-val">${trace.taint ? '⚠ tainted' : 'clean'}</span>
        </div>
      </div>

      <div class="detail-section">
        <h3>Metadata</h3>
        <div class="field-grid">
          <span class="field-key">id</span>
          <span class="field-val">${trace.id}</span>
          <span class="field-key">timestamp</span>
          <span class="field-val">${trace.timestamp}</span>
          <span class="field-key">descriptor_hash</span>
          <span class="field-val">${hashDisplay}</span>
          <span class="field-key">schema_version</span>
          <span class="field-val">${trace.schema_version}</span>
        </div>
      </div>
    `;
  }

  // ── Selection ─────────────────────────────────────────────
  function selectTrace(id) {
    selectedId = id;
    const trace = traces.find(t => t.id === id);
    if (!trace) return;

    tbody.querySelectorAll('tr[data-id]').forEach(row => {
      row.classList.toggle('selected', Number(row.dataset.id) === id);
    });

    detailPH.style.display = 'none';
    detailDiv.style.display = 'block';
    renderDetail(trace);
  }

  // ── Fetch & poll ──────────────────────────────────────────
  async function fetchTraces() {
    try {
      const res = await fetch('/traces?limit=200');
      if (!res.ok) throw new Error(res.status);
      const data = await res.json();
      traces = data.traces || [];
      renderList();
      // Keep detail in sync if selected trace updated
      if (selectedId !== null) {
        const current = traces.find(t => t.id === selectedId);
        if (current) renderDetail(current);
      }
      statusEl.textContent = `live · ${traces.length} trace${traces.length !== 1 ? 's' : ''}`;
      statusEl.className = 'live';
    } catch (err) {
      statusEl.textContent = `error: ${err.message}`;
      statusEl.className = 'error';
    }
  }

  // ── Scenario buttons ─────────────────────────────────────
  const SCENARIO_LABELS = {
    benign_flow:         'Benign',
    prompt_injection:    'Injection',
    poisoned_descriptor: 'Poisoned',
    absent_tool:         'Absent',
  };

  async function runScenario(name, btn) {
    btn.disabled = true;
    btn.textContent = '…';
    try {
      const res = await fetch(`/scenarios/${name}/run`, { method: 'POST' });
      if (!res.ok) throw new Error(res.status);
      const data = await res.json();
      await fetchTraces();
      if (data.trace_id != null) selectTrace(data.trace_id);
    } catch (err) {
      statusEl.textContent = `error: ${err.message}`;
      statusEl.className = 'error';
    } finally {
      btn.disabled = false;
      btn.textContent = SCENARIO_LABELS[name] || name;
    }
  }

  document.querySelectorAll('.scenario-btn').forEach(btn => {
    btn.addEventListener('click', () => runScenario(btn.dataset.scenario, btn));
  });

  fetchTraces();
  setInterval(fetchTraces, POLL_MS);

  // ── Panel tab switching ───────────────────────────────
  let activePanel = 'detail';

  function switchPanel(name) {
    activePanel = name;
    document.querySelectorAll('.panel-tab').forEach(t =>
      t.classList.toggle('active', t.dataset.panel === name));
    document.getElementById('detail-view').style.display    = name === 'detail'  ? '' : 'none';
    document.getElementById('compare-panel').style.display  = name === 'compare' ? '' : 'none';
  }

  document.querySelectorAll('.panel-tab').forEach(tab => {
    tab.addEventListener('click', () => switchPanel(tab.dataset.panel));
  });

  // ── Compare / World Diff ──────────────────────────────
  async function runCompare() {
    const scenario = document.getElementById('cmp-scenario').value;
    const worlds = [...document.querySelectorAll('.cmp-world:checked')].map(cb => cb.value);
    if (!worlds.length) return;
    const btn = document.getElementById('cmp-run-btn');
    btn.disabled = true;
    btn.textContent = '…';
    document.getElementById('cmp-result').innerHTML = '';
    try {
      const res = await fetch('/compare', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ scenario, worlds }),
      });
      if (!res.ok) throw new Error(res.status);
      const data = await res.json();
      renderCompareResults(data);
    } catch (err) {
      document.getElementById('cmp-result').innerHTML =
        `<span style="color:#f85149">Error: ${err.message}</span>`;
    } finally {
      btn.disabled = false;
      btn.textContent = 'Compare';
    }
  }

  function renderCompareResults(data) {
    const worldResults = data.worlds;
    const decisions = Object.values(worldResults).map(r => r.decision);
    const diverged = new Set(decisions).size > 1;

    const banner = diverged
      ? `<div class="cmp-banner cmp-diverged">DIVERGED — worlds disagree</div>`
      : `<div class="cmp-banner cmp-converged">CONVERGED — all worlds agree</div>`;

    const tally = {};
    decisions.forEach(d => tally[d] = (tally[d] || 0) + 1);
    const majority = Object.entries(tally).sort((a, b) => b[1] - a[1])[0][0];

    const rows = Object.entries(worldResults).map(([world, r]) => {
      const cls = r.decision !== majority ? ' class="cmp-row-diff"' : '';
      return `<tr${cls}><td>${world}</td><td>${badge(r.decision)}</td><td>${r.rule}</td></tr>`;
    }).join('');

    document.getElementById('cmp-result').innerHTML = `
      ${banner}
      <table class="cmp-table">
        <thead><tr><th>World</th><th>Decision</th><th>Rule</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  document.getElementById('cmp-run-btn').addEventListener('click', runCompare);
</script>
</body>
</html>
